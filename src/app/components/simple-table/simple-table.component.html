<table *ngIf="tableData && tableData.length">
    <thead>
      <tr>
        <th *ngFor="let headerKey of getTableHeaderKeys()" (click)="headerSelection(headerKey, tableData[0][headerKey])">
          {{ headerKey }}
        </th>
      </tr>
    </thead>
  
    <tbody>
      <tr *ngFor="let row of tableData">
        <td *ngFor="let data of row | keyvalue">{{ data.value }}</td>
      </tr>
    </tbody>
  </table>
